services:
  postgres:
    image: pgvector/pgvector:0.8.3-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_context}
      POSTGRES_USER: ${POSTGRES_USER:-agent_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_app}
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/migrations:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agent_app} -d ${POSTGRES_DB:-agent_context}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
